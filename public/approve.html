<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Status Check-in — Newderma1</title>
<style>
  :root {
    --green: #6abf4b;
    --green-dark: #5aaf3b;
    --navy: #1e293b;
    --slate: #475569;
    --slate-light: #94a3b8;
    --bg: #f8fafc;
    --border: #e2e8f0;
    --red: #ef4444;
    --amber: #f59e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Calibri, Arial, sans-serif;
    background: var(--bg);
    color: var(--navy);
  }
  .header {
    background: var(--navy);
    color: white;
    padding: 20px 16px;
    text-align: center;
  }
  .header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  .header p { font-size: 13px; margin: 4px 0 0; color: var(--slate-light); }
  .wrap { max-width: 560px; margin: 0 auto; padding: 20px 16px 60px; }
  .greeting { font-size: 15px; color: var(--slate); margin-bottom: 20px; }
  .task-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .task-text { font-size: 15px; font-weight: 500; margin-bottom: 12px; line-height: 1.4; }
  .status-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .status-btn {
    flex: 1;
    min-width: 90px;
    padding: 10px 8px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--slate);
    transition: all 0.15s ease;
  }
  .status-btn.selected[data-status="done"] { background: #22c55e; border-color: #22c55e; color: white; }
  .status-btn.selected[data-status="in_progress"] { background: var(--amber); border-color: var(--amber); color: white; }
  .status-btn.selected[data-status="not_yet"] { background: var(--red); border-color: var(--red); color: white; }
  .note-field {
    display: none;
    width: 100%;
    margin-top: 10px;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    min-height: 44px;
  }
  .note-field.visible { display: block; }
  .submit-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--green);
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
  }
  .submit-btn:disabled { background: var(--slate-light); cursor: not-allowed; }
  .submit-btn:not(:disabled):active { background: var(--green-dark); }
  .state-message {
    text-align: center;
    padding: 60px 20px;
    font-size: 15px;
    color: var(--slate);
  }
  .state-message.success { color: var(--green-dark); font-weight: 600; }
  .state-message.error { color: var(--red); }
  .hidden { display: none; }
</style>
</head>
<body>
  <div class="header">
    <h1>Newderma1 — Task Check-in</h1>
    <p id="subheader">Loading…</p>
  </div>
  <div class="wrap">
    <div id="loadingState" class="state-message">Loading your tasks…</div>
    <div id="errorState" class="state-message error hidden"></div>
    <div id="successState" class="state-message success hidden">Sent — thanks for the update.</div>

    <div id="formArea" class="hidden">
      <p class="greeting" id="greeting"></p>
      <div id="taskList"></div>
      <button id="submitBtn" class="submit-btn" disabled>Send update</button>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const answers = {}; // task_id -> { status, note }

  const loadingState = document.getElementById('loadingState');
  const errorState = document.getElementById('errorState');
  const successState = document.getElementById('successState');
  const formArea = document.getElementById('formArea');
  const subheader = document.getElementById('subheader');
  const greeting = document.getElementById('greeting');
  const taskList = document.getElementById('taskList');
  const submitBtn = document.getElementById('submitBtn');

  function showError(msg) {
    loadingState.classList.add('hidden');
    errorState.textContent = msg;
    errorState.classList.remove('hidden');
  }

  function updateSubmitState() {
    const allTasks = document.querySelectorAll('.task-card').length;
    const answered = Object.keys(answers).length;
    submitBtn.disabled = answered < allTasks;
  }

  function renderTasks(tasks) {
    taskList.innerHTML = '';
    tasks.forEach((task) => {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.innerHTML = `
        <div class="task-text">${escapeHtml(task.task_text)}</div>
        <div class="status-row">
          <button type="button" class="status-btn" data-status="done">Done</button>
          <button type="button" class="status-btn" data-status="in_progress">In progress</button>
          <button type="button" class="status-btn" data-status="not_yet">Not yet</button>
        </div>
        <textarea class="note-field" placeholder="Optional note…"></textarea>
      `;
      const buttons = card.querySelectorAll('.status-btn');
      const noteField = card.querySelector('.note-field');
      buttons.forEach((btn) => {
        btn.addEventListener('click', () => {
          buttons.forEach((b) => b.classList.remove('selected'));
          btn.classList.add('selected');
          const status = btn.dataset.status;
          answers[task.id] = { status, note: noteField.value };
          noteField.classList.toggle('visible', status !== 'done');
          updateSubmitState();
        });
      });
      noteField.addEventListener('input', () => {
        if (answers[task.id]) answers[task.id].note = noteField.value;
      });
      taskList.appendChild(card);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function load() {
    if (!token) {
      showError('This link is missing information. Please use the link from your email.');
      return;
    }
    try {
      const res = await fetch(`/api/approval/${token}`);
      const data = await res.json();
      if (!res.ok) {
        showError(data.error || 'Something went wrong loading this link.');
        return;
      }
      subheader.textContent = `Hi ${data.employeeName}`;
      greeting.textContent = 'Tap a status for each item below, then send.';
      renderTasks(data.tasks);
      loadingState.classList.add('hidden');
      formArea.classList.remove('hidden');
    } catch (e) {
      showError('Could not reach the server. Check your connection and try again.');
    }
  }

  submitBtn.addEventListener('click', async () => {
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';
    const payload = {
      answers: Object.entries(answers).map(([task_id, v]) => ({
        task_id,
        status: v.status,
        note: v.note,
      })),
    };
    try {
      const res = await fetch(`/api/approval/${token}/submit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) {
        showError(data.error || 'Could not send. Please try again.');
        formArea.classList.add('hidden');
        return;
      }
      formArea.classList.add('hidden');
      successState.classList.remove('hidden');
    } catch (e) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send update';
      showError('Could not reach the server. Please try again.');
    }
  });

  load();
</script>
</body>
</html>
